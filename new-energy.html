    <script src="mobile-optimize.js"></script>
    <script>
        let currentNewsIndex = 0;
        const newsPerPage = 10;
        let allNews = [
    {"id": "e1", "title": "【重磅】美国2026年将新增24.3GW电池储能，太阳能43.4GW", "category": "新能源", "tag": "数据", "time": "3月3日", "views": "156万", "content": "美国能源信息署(EIA)报告显示，2026年美国将新增86GW公用事业级发电容量，其中太阳能43.4GW(同比增长60%)，电池储能24.3GW(超2025年15GW纪录)。德州占太阳能新增40%(17.4GW)，亚利桑那和加州各占约6%。", "sources": [{"name": "EIA", "url": "https://www.eia.gov"}]},
    {"id": "e2", "title": "太阳能、风能和储能将占2026年美国新增发电容量99%", "category": "新能源", "tag": "趋势", "time": "3月2日", "views": "128万", "content": "EIA预测2026年美国净新增发电容量 virtually 100%来自太阳能、风能和电池储能。公用事业级可再生能源加储能预计增加近7000万千瓦，相当于70座核电站容量。到2026年11月，可再生能源发电量将接近天然气，占总装机超36%。", "sources": [{"name": "Environment America", "url": "https://environmentamerica.org"}]},
    {"id": "e3", "title": "2026年最新家用储能电池对比：特斯拉、LG、CNTE等7款新品", "category": "新能源", "tag": "产品", "time": "3月1日", "views": "98万", "content": "2026年家用储能电池新品：Tesla Powerwall 3集成11.5kW逆变器；LG Prime+ 16kWh高能量密度；CNTE堆叠式LFP系列5-30kWh模块化；FranklinWH aPower 2.0 15kWh支持发电机；Enphase IQ Battery 5P内置微逆变器；BYD HVS 2.0快充升级；Panasonic EverVolt 2.0 DC耦合版。LFP化学成主流。", "sources": [{"name": "CNTE Power", "url": "https://en.cntepower.com"}]},
    {"id": "e4", "title": "香港电池展亚洲2026：推动亚太EV和储能增长", "category": "新能源", "tag": "展会", "time": "3月", "views": "76万", "content": "The Battery Show Asia 2026将于3月在香港亚洲国际博览馆举行，汇聚350+全球参展商和2万+专业买家。亚洲预计在未来十年主导全球电池市场，受国家脱碳目标和印度、印尼、日本大规模EV采用推动。", "sources": [{"name": "EV Charging Magazine", "url": "https://evchargingmag.com"}]},
    {"id": "e5", "title": "ProLogium与达方能源推出固态电池解决方案", "category": "新能源", "tag": "技术", "time": "1月", "views": "87万", "content": "固态电池制造商ProLogium与达方能源科技合作，推出面向电动自行车和轻型电动车的新固态电池解决方案。ProLogium提供第四代超流化全无机固态电芯，达方负责系统集成。固态电池将为储能市场带来安全与效率的变革。", "sources": [{"name": "EV Infrastructure News", "url": "https://www.evinfrastructurenews.com"}]},
    {"id": "e6", "title": "Autel Energy发布Avant系列EV充电基础设施", "category": "新能源", "tag": "充电", "time": "1月", "views": "65万", "content": "Autel Energy在CES 2026发布Avant系列AC和DC充电解决方案，面向车队 depot、物流枢纽和自动驾驶运营。支持无接触自动充电、设备诊断和预防性维护。兼容OCPP和ISO 15118开放标准，避免供应商锁定。", "sources": [{"name": "EV Infrastructure News", "url": "https://www.evinfrastructurenews.com"}]},
    {"id": "e7", "title": "我国建成全球最大可再生能源体系，风电光伏超火电", "category": "新能源", "tag": "重磅", "time": "3月2日", "views": "203万", "content": "国家能源局数据显示，截至2025年底，我国可再生能源总装机达23.4亿千瓦。风电光伏合计装机历史性超过火电，由2020年的5.3亿千瓦增加到2025年的18.4亿千瓦，每用10度电就有近4度是绿电。", "sources": [{"name": "人民日报", "url": "https://paper.people.com.cn"}]},
    {"id": "e8", "title": "新型储能装机历史性突破1亿千瓦，占全球超40%", "category": "新能源", "tag": "储能", "time": "3月1日", "views": "145万", "content": "'十四五'时期，我国建成全球最大、发展最快的可再生能源体系。新型储能装机历史性突破1亿千瓦大关，'巨型充电宝'让风光发电更稳定，占全球比重超40%。", "sources": [{"name": "央广网", "url": "https://www.cnr.cn"}]},
    {"id": "e9", "title": "希腊获欧盟批准4亿欧元可再生能源国家援助", "category": "新能源", "tag": "政策", "time": "3月1日", "views": "54万", "content": "欧盟委员会批准希腊一项价值4亿欧元的国家援助计划，通过直接拨款和税收优惠促进清洁技术投资，涵盖电动汽车电池、光伏、风力发电机组、热泵、绿色氢气生产等领域。", "sources": [{"name": "国际风力发电网", "url": "https://wind.in-en.com"}]},
    {"id": "e10", "title": "匈牙利计划建设499MW风电项目，2030年投运", "category": "新能源", "tag": "海外", "time": "3月1日", "views": "43万", "content": "绿色能源投资公司宣布将在匈牙利建设大型风能项目，安装70台风力发电机，总装机容量499兆瓦。首座风力发电机塔筒预计将于2028年初竖立，2030年初使整个风电场投入运营。", "sources": [{"name": "国际风力发电网", "url": "https://wind.in-en.com"}]}
];
        
        function renderNews() {
            const newsList = document.getElementById('news-list');
            const newsToShow = allNews.slice(0, currentNewsIndex + newsPerPage);
            
            newsList.innerHTML = newsToShow.map(news => `
                <div class="news-item" onclick="location.href='news-detail.html?id=${news.id}'">
                    <div class="news-title">
                        ${news.tag ? `<span class="tag">${news.tag}</span>` : ''}
                        ${news.title}
                    </div>
                    <div class="news-meta">${news.time} · ${news.category}</div>
                </div>
            `).join('');
        }
        
        function loadMoreNews() {
            currentNewsIndex += newsPerPage;
            renderNews();
        }
        
        renderNews();
    </script>
