    <script>
        let currentNewsIndex = 0;
        const newsPerPage = 10;
        let allNews = [{"id": "e1", "title": "我国建成全球最大的可再生能源体系，每用10度电就有近4度是绿电", "category": "新能源", "tag": "重磅", "time": "3月2日", "views": "92万", "content": "国家能源局数据显示，截至2025年底，我国可再生能源总装机达23.4亿千瓦。风电光伏合计装机历史性超过火电，由2020年的5.3亿千瓦增加到2025年的18.4亿千瓦。", "sources": [{"name": "人民日报", "url": "https://paper.people.com.cn/rmrb/pc/content/202603/02/content_30142959.html"}]}, {"id": "e2", "title": "2026年新能源发电展望：光伏、风电现状及趋势", "category": "新能源", "tag": "趋势", "time": "2025年8月", "views": "68万", "content": "2025年我国光伏新增装机预计达270-300GW，占全球比重超53%，累计装机突破10亿千瓦，首次超越火电成为第一大电源。N型TOPCon电池市占率达71.1%，效率提升至27%。", "sources": [{"name": "紫荆新能源", "url": "http://mp.weixin.qq.com/s?__biz=MzkzODY1Mjk1OQ=="}]}, {"id": "e3", "title": "新型储能装机历史性突破1亿千瓦大关，占全球比重超40%", "category": "新能源", "tag": "储能", "time": "3月1日", "views": "54万", "content": "'十四五'时期，我国建成全球最大、发展最快的可再生能源体系。新型储能装机历史性突破1亿千瓦大关，'巨型充电宝'让风光发电更稳定。", "sources": [{"name": "央广网", "url": "https://www.cnr.cn/newscenter/native/gd/20260303/t20260303_527541580.shtml"}]}, {"id": "e4", "title": "光伏反内卷成效几何？终端为何涨价难？", "category": "新能源", "tag": "分析", "time": "2月21日", "views": "47万", "content": "多晶硅市场交投清淡，硅料企业多处于大幅减产甚至停产状态。南网能源宣布2026年不再新增持有光伏等智慧绿电项目，五大发电集团也在不同程度收紧光伏电站项目投资。", "sources": [{"name": "财新网", "url": "https://database.caixin.com/2026-02-21/102415974.html"}]}, {"id": "e5", "title": "匈牙利计划建设499MW风电项目，2030年投入运营", "category": "新能源", "tag": "海外", "time": "3月1日", "views": "31万", "content": "绿色能源投资公司宣布将在匈牙利建设大型风能项目，安装70台风力发电机，总装机容量499兆瓦。首座风力发电机塔筒预计将于2028年初竖立，2030年初使整个风电场投入运营。", "sources": [{"name": "国际风力发电网", "url": "https://wind.in-en.com/html/wind-2465677.shtml"}]}, {"id": "e6", "title": "希腊为可再生能源提供4亿欧元国家援助", "category": "新能源", "tag": "政策", "time": "3月1日", "views": "28万", "content": "欧盟委员会批准希腊一项价值4亿欧元的国家援助计划，旨在通过直接拨款和税收优惠促进清洁技术投资，涵盖电动汽车电池、光伏、风力发电机组、热泵、绿色氢气生产等领域。", "sources": [{"name": "国际风力发电网", "url": "https://wind.in-en.com/html/wind-2465677.shtml"}]}, {"id": "e7", "title": "海关总署：2025年锂电池、风力发电机组出口分别增长26.2%、48.7%", "category": "新能源", "tag": "贸易", "time": "1月14日", "views": "42万", "content": "海关总署表示，在绿色能源领域，2025年锂电池、风力发电机组出口分别增长26.2%、48.7%；在绿色出行领域，电动摩托车及脚踏车出口增长18.1%。", "sources": [{"name": "清华大学能源互联网", "url": "http://www.ceia.eea.tsinghua.edu.cn/hyzx/d897074d22204e38ba21f027b4d574b3.htm"}]}, {"id": "e8", "title": "中国新能源汽车、光伏等全球领先，引领世界绿色转型", "category": "新能源", "tag": "全球", "time": "1月24日", "views": "56万", "content": "世界经济论坛2026年年会报告显示，全球绿色经济已成长为价值5万亿美元的巨大市场。中国生产全球约80%太阳能电池，2025年全球电动汽车销量2070万辆，中国达1290万辆。", "sources": [{"name": "新浪财经", "url": "https://finance.sina.com.cn/jjxw/2026-01-24/doc-inhikesz5808602.shtml"}]}, {"id": "e9", "title": "河北发布2025-2026年新政：启动新能源竞价，风电光伏分类型出清", "category": "新能源", "tag": "政策", "time": "2025年10月", "views": "35万", "content": "河北省发改委发布通知，开展对应年度增量新能源项目机制电价竞价工作，要求按风电、光伏类型分别组织竞价与出清，推动新能源上网电量全面进入市场。", "sources": [{"name": "碳管理师", "url": "http://tanguanli.org.cn/tanyunzixun/13887.html"}]}, {"id": "e10", "title": "中核集团2025-2026年度280个风电光伏项目收购计划", "category": "新能源", "tag": "投资", "time": "2024年12月", "views": "38万", "content": "中核集团正在加速新能源布局，计划在未来两年内收购280个风电和光伏项目。这反映出中核集团对于新能源市场的深刻洞察力以及市场需求的迫切性。", "sources": [{"name": "搜狐", "url": "https://www.sohu.com/a/843157594_122066678"}]}];
        
        function renderNews() {
            const newsList = document.getElementById('news-list');
            const newsToShow = allNews.slice(0, currentNewsIndex + newsPerPage);
            
            newsList.innerHTML = newsToShow.map(news => `
                <div class="news-item" onclick="location.href='news-detail.html?id=${news.id}'">
                    <div class="news-title">
                        ${news.tag ? `<span class="tag">${news.tag}</span>` : ''}
                        ${news.title}
                    </div>
                    <div class="news-meta">${news.time} · ${news.category}</div>
                </div>
            `).join('');
        }
        
        function loadMoreNews() {
            currentNewsIndex += newsPerPage;
            renderNews();
        }
        
        renderNews();
    </script>
