<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资讯详情 - 前沿科技日报</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; background: #f4f5f6; line-height: 1.6; }
        
        .header { background: #d43030; color: #fff; padding: 12px 15px; position: sticky; top: 0; z-index: 100; }
        .nav { display: flex; overflow-x: auto; gap: 20px; padding: 10px 15px; background: #fff; border-bottom: 1px solid #e8e8e8; }
        .nav a { color: #666; text-decoration: none; font-size: 14px; white-space: nowrap; }
        .nav a.active { color: #d43030; font-weight: bold; }
        
        .article-container { max-width: 800px; margin: 20px auto; background: #fff; padding: 30px; }
        .article-header { border-bottom: 1px solid #f0f0f0; padding-bottom: 20px; margin-bottom: 20px; }
        .article-title { font-size: 24px; font-weight: bold; color: #333; margin-bottom: 15px; line-height: 1.4; }
        .article-meta { font-size: 14px; color: #999; }
        .article-tag { display: inline-block; background: #d43030; color: #fff; padding: 2px 8px; border-radius: 3px; font-size: 12px; margin-right: 10px; }
        
        .article-content { font-size: 16px; color: #333; line-height: 1.8; }
        .article-content p { margin-bottom: 15px; }
        
        .sources { background: #f8f8f8; padding: 15px; margin-top: 30px; border-radius: 4px; }
        .sources-title { font-size: 14px; font-weight: bold; color: #666; margin-bottom: 10px; }
        .source-item { font-size: 13px; color: #666; margin-bottom: 5px; }
        .source-item a { color: #d43030; text-decoration: none; }
        
        .stocks { margin-top: 30px; padding: 15px; background: #fff8f8; border: 1px solid #ffd4d4; border-radius: 4px; }
        .stocks-title { font-size: 14px; font-weight: bold; color: #d43030; margin-bottom: 10px; }
        .stock-item { display: inline-block; background: #fff; border: 1px solid #e0e0e0; padding: 5px 12px; margin-right: 10px; margin-bottom: 10px; border-radius: 4px; font-size: 13px; cursor: pointer; }
        .stock-item:hover { background: #d43030; color: #fff; border-color: #d43030; }
        
        .footer { background: #333; color: #999; text-align: center; padding: 20px; margin-top: 20px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="header">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div style="font-size: 18px; font-weight: bold;">前沿科技日报</div>
            <div>
                <button onclick="alert('登录功能开发中')" style="background: #fff; color: #d43030; border: none; padding: 6px 16px; border-radius: 4px; font-size: 14px; cursor: pointer; margin-right: 8px;">登录</button>
                <button onclick="alert('注册功能开发中')" style="background: transparent; color: #fff; border: 1px solid #fff; padding: 6px 16px; border-radius: 4px; font-size: 14px; cursor: pointer;">注册</button>
            </div>
        </div>
    </div>
    
    <div class="nav">
        <a href="index.html">首页</a>
        <a href="world.html">国际局势</a>
        <a href="ai.html">人工智能</a>
        <a href="semiconductor.html">半导体</a>
        <a href="new-energy.html">新能源</a>
        <a href="biotech.html">生物医药</a>
        <a href="robotics.html">机器人</a>
        <a href="space.html">商业航天</a>
        <a href="fusion.html">核聚变</a>
        <a href="quantum.html">量子计算</a>
        <a href="crypto.html">数字货币</a>
        <a href="game.html">游戏</a>
        <a href="search.html" style="margin-left: auto; display: flex; align-items: center; gap: 5px; color: #d43030;">🔍 搜索</a>
    </div>

    <div class="article-container">
        <div class="article-header">
            <div class="article-title"><span id="tag"></span><span id="title"></span></div>
            <div class="article-meta">
                <span id="category"></span> · <span id="time"></span>
            </div>
        </div>
        
        <div class="article-content" id="content">
            <p>加载中...</p>
        </div>
        
        <div class="sources">
            <div class="sources-title">📰 信息来源</div>
            <div id="sources-list"></div>
        </div>
        
        <div class="stocks">
            <div class="stocks-title">📈 相关股票</div>
            <div id="stocks-list"></div>
        </div>
    </div>

    <div class="footer">
        <p>前沿科技日报 · 全球科技投资情报 · 每日更新</p>
    </div>

    <script>
        // 获取URL参数
        const urlParams = new URLSearchParams(window.location.search);
        const newsId = urlParams.get('id');
        
        // 从 JSON 文件加载资讯数据
        async function loadNewsData() {
            try {
                const response = await fetch('news-data.json');
                const data = await response.json();
                // news-data.json 格式: { "news": [...] }
                return data.news || [];
            } catch (error) {
                console.error('加载资讯数据失败:', error);
                return [];
            }
        }
        
        // 页面加载时显示资讯
        loadNewsData().then(allNews => {
            const news = allNews.find(n => n.id == newsId);
            
            if (news) {
                document.getElementById('title').textContent = news.title;
                document.getElementById('category').textContent = news.category;
                document.getElementById('time').textContent = news.time;
                document.getElementById('content').innerHTML = `<p>${news.content}</p>`;
                
                if (news.tag) {
                    document.getElementById('tag').innerHTML = `<span class="article-tag">${news.tag}</span>`;
                }
                
                // 显示来源
                if (news.sources) {
                    document.getElementById('sources-list').innerHTML = news.sources.map(s => 
                        `<div class="source-item">• <a href="${s.url}" target="_blank">${s.name}</a></div>`
                    ).join('');
                }
                
                // 显示股票
                if (news.stocks) {
                    document.getElementById('stocks-list').innerHTML = news.stocks.map(s => 
                        `<span class="stock-item" onclick="location.href='stock.html?code=${s}'">${s}</span>`
                    ).join('');
                }
            } else {
                document.getElementById('content').innerHTML = '<p>资讯不存在或已被删除</p>';
            }
        });
    </script>
</body>
</html>
