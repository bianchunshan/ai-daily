</head>

                <button onclick="alert('注册功能开发中')" style="background: transparent; color: #fff; border: 1px solid #fff; padding: 8px 16px; border-radius: 6px; font-size: 14px; cursor: pointer; min-height: 36px;">注册</button>
            </div>
        </div>
    </div>
    
    <div class="nav">
        <a href="index.html">首页</a>
        <a href="world.html" class="active">国际局势</a>

        <a href="quantum.html">量子计算</a>
        <a href="crypto.html">数字货币</a>
        <a href="game.html">游戏</a>

    <div class="news-list" id="news-list"></div>

    <div class="load-more">
        <button class="load-more-btn" onclick="loadMoreNews()">加载更多</button>
    </div>

    <div class="footer">
        <p>前沿科技日报 · 全球科技投资情报 · 每日更新</p>
    </div>

    <!-- 底部固定导航栏 -->
    <div class="bottom-nav">
        <a href="index.html" class="bottom-nav-item">
            <span style="font-size: 22px;">🏠</span>
            <span>首页</span>
        </a>
        <a href="world.html" class="bottom-nav-item active">
            <span style="font-size: 22px;">📑</span>
            <span>分类</span>
        </a>
        <a href="#" class="bottom-nav-item" id="settings-btn">
            <span style="font-size: 22px;">⚙️</span>
            <span>设置</span>
        </a>
    </div>

    <!-- 设置面板 -->
    <div class="settings-panel" id="settings-panel">
        <div class="settings-content">
            <div class="settings-header">
                <span class="settings-title">⚙️ 设置</span>
                <button class="settings-close" id="settings-close">✕</button>
            </div>
            
            <div class="settings-section">
                <div class="settings-section-title">显示模式</div>
                <div class="theme-toggle">
                    <span class="theme-toggle-label">夜间模式</span>
                    <label class="switch">
                        <input type="checkbox" id="theme-toggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            
            <div class="settings-section">
                <div class="settings-section-title">字体大小</div>
                <div class="font-size-options">
                    <button class="font-size-btn small" data-size="small">小</button>
                    <button class="font-size-btn medium" data-size="medium">中</button>
                    <button class="font-size-btn large" data-size="large">大</button>
                    <button class="font-size-btn xlarge" data-size="xlarge">特大</button>
                </div>
            </div>
            
            <div class="settings-section">
                <div class="settings-section-title">关于</div>
                <p style="color: var(--text-muted); font-size: 0.9rem; line-height: 1.8;">
                    前沿科技日报<br>
                    全球科技投资情报 · 每日更新<br><br>
                    版本: 2.0
                </p>
            </div>
        </div>
    </div>

    <script src="mobile-optimize.js"></script>
    <script>
        let currentNewsIndex = 0;
        const newsPerPage = 10;
        let allNews = [];
        
        // 从JSON文件加载数据
        fetch('world-news-data.json')
            .then(response => response.json())
            .then(data => {
                allNews = data['国际局势'] || [];
                renderNews();
            })
            .catch(err => {
                console.error('加载数据失败:', err);
                // 使用备用数据
                allNews = [{"id": "w1", "title": "【突发】美以联合打击伊朗进入第三天，哈梅内伊遇害身亡", "category": "国际局势", "tag": "战争", "time": "刚刚", "views": "128.5万", "content": "2026年2月28日，美国和以色列对伊朗发动大规模军事打击，伊朗最高领袖哈梅内伊在袭击中身亡。伊朗随即启动'真实承诺-4'行动进行报复，特朗普称军事行动可能持续四到五周。", "sources": [{"name": "新华社", "url": "https://www.news.cn"}]}, {"id": "w2", "title": "伊朗封锁霍尔木兹海峡，全球石油运输受阻", "category": "国际局势", "tag": "能源危机", "time": "2小时前", "views": "95.3万", "content": "伊朗伊斯兰革命卫队海军宣布封锁霍尔木兹海峡，禁止所有船只通过。该海峡承担全球20%-30%的原油运输。", "sources": [{"name": "财新网", "url": "https://www.caixin.com"}]}, {"id": "w3", "title": "沙特以色列罕见结盟，共同施压美国对伊朗动武", "category": "国际局势", "tag": "地缘政治", "time": "5小时前", "views": "87.2万", "content": "2026年3月2日，沙特公开放话与以色列站一边，要求美国对伊朗动手。伊朗红新月会统计，空袭已造成至少555人死亡。", "sources": [{"name": "网易", "url": "https://www.163.com"}]}, {"id": "w4", "title": "印尼总统普拉博沃提议斡旋中东局势", "category": "国际局势", "tag": "外交", "time": "8小时前", "views": "45.6万", "content": "印度尼西亚总统普拉博沃表示已做好准备前往伊朗进行调解。伊朗驻印尼大使馆对此表示赞赏。", "sources": [{"name": "网易", "url": "https://www.163.com"}]}, {"id": "w5", "title": "英国允许美军使用其军事基地打击伊朗导弹设施", "category": "国际局势", "tag": "军事", "time": "12小时前", "views": "62.1万", "content": "英国已同意美国请求，允许美军使用其军事基地打击伊朗导弹设施。作为回应，伊朗向位于塞浦路斯的一处英国空军基地发射了无人机。", "sources": [{"name": "网易", "url": "https://www.163.com"}]}];
                renderNews();
            });
        
        function renderNews() {
            const newsList = document.getElementById('news-list');
            if (allNews.length === 0) {
                newsList.innerHTML = '<div style="padding: 40px; text-align: center; color: var(--text-muted);">暂无资讯，正在抓取中...</div>';
                return;
            }
            const newsToShow = allNews.slice(0, currentNewsIndex + newsPerPage);
            
            newsList.innerHTML = newsToShow.map(news => `
                <div class="news-item" onclick="location.href='news-detail.html?id=${news.id}'">
                    <div class="news-title">
                        ${news.tag ? `<span class="tag">${news.tag}</span>` : ''}
                        ${news.title}
                    </div>
                    <div class="news-meta">${news.time} · ${news.category}</div>
                </div>
            `).join('');
        }
        
        function loadMoreNews() {
            currentNewsIndex += newsPerPage;
            renderNews();
        }
        
        renderNews();
    </script>

    <!-- 统一数据源 -->
    <script src="data/news-data.js"></script>
</body>
</html>
