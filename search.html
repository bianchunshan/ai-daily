        // 热门搜索词
        const hotSearches = ['人工智能', '半导体', '新能源', '伊朗', '机器人', '核聚变', '量子计算', '比特币'];

        // 搜索状态
        let currentQuery = '';
        let currentCategory = 'all';
        let searchResults = [];
        let currentPage = 0;
        const resultsPerPage = 10;

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderHotTags();
            setupCategoryFilters();
            setupSearchInput();
            
            // 检查URL参数
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('q');
            const category = urlParams.get('category');
            
            if (query) {
                document.getElementById('searchInput').value = query;
                currentQuery = query;
            }
            if (category) {
                currentCategory = category;
                updateCategoryUI();
            }
            if (query) {
                performSearch();
            }
        });

        // 渲染热门标签
        function renderHotTags() {
            const container = document.getElementById('hotTags');
            container.innerHTML = hotSearches.map(tag => 
                `<span class="hot-tag" onclick="searchHot('${tag}')">${tag}</span>`
            ).join('');
        }

        // 热门搜索点击
        function searchHot(keyword) {
            document.getElementById('searchInput').value = keyword;
            currentQuery = keyword;
            performSearch();
        }

        // 设置分类筛选
        function setupCategoryFilters() {
            const tags = document.querySelectorAll('.category-tag');
            tags.forEach(tag => {
                tag.addEventListener('click', function() {
                    tags.forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    currentCategory = this.dataset.category;
                    if (currentQuery) {
                        performSearch();
                    }
                });
            });
        }

        // 更新分类UI
        function updateCategoryUI() {
            const tags = document.querySelectorAll('.category-tag');
            tags.forEach(tag => {
                tag.classList.toggle('active', tag.dataset.category === currentCategory);
            });
        }

        // 设置搜索输入
        function setupSearchInput() {
            const input = document.getElementById('searchInput');
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    performSearch();
                }
            });
        }

        // 执行搜索
        function performSearch() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query && currentCategory === 'all') {
                document.getElementById('resultsCount').textContent = '请输入关键词开始搜索';
                document.getElementById('resultsList').innerHTML = '';
                document.getElementById('loadMoreBtn').classList.add('hidden');
                return;
            }

            currentQuery = query;
            currentPage = 0;
            
            // 获取搜索选项
            const searchTitle = document.getElementById('searchTitle').checked;
            const searchContent = document.getElementById('searchContent').checked;
            const searchTag = document.getElementById('searchTag').checked;

            // 执行搜索
            searchResults = searchIndex.filter(item => {
                // 分类筛选
                if (currentCategory !== 'all' && item.category !== currentCategory) {
                    return false;
                }

                if (!query) return true;

                // 关键词搜索
                const lowerQuery = query.toLowerCase();
                const matchTitle = searchTitle && item.title.toLowerCase().includes(lowerQuery);
                const matchContent = searchContent && item.content && item.content.toLowerCase().includes(lowerQuery);
                const matchTag = searchTag && item.tag && item.tag.toLowerCase().includes(lowerQuery);

                return matchTitle || matchContent || matchTag;
            });

            // 排序：标题匹配优先
            if (query) {
                searchResults.sort((a, b) => {
                    const aTitleMatch = a.title.toLowerCase().includes(query.toLowerCase());
                    const bTitleMatch = b.title.toLowerCase().includes(query.toLowerCase());
                    if (aTitleMatch && !bTitleMatch) return -1;
                    if (!aTitleMatch && bTitleMatch) return 1;
                    return 0;
                });
            }

            // 更新结果计数
            document.getElementById('resultsCount').innerHTML = 
                query ? `找到 <span>${searchResults.length}</span> 条相关结果` : `共 <span>${searchResults.length}</span> 条资讯`;

            // 渲染结果
            renderResults();
        }

        // 高亮关键词
        function highlightText(text, query) {
            if (!query || !text) return text;
            const regex = new RegExp(`(${escapeRegex(query)})`, 'gi');
            return text.replace(regex, '<span class="highlight">$1</span>');
        }

        // 转义正则特殊字符
        function escapeRegex(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        // 渲染搜索结果
        function renderResults() {
            const container = document.getElementById('resultsList');
            const start = 0;
            const end = (currentPage + 1) * resultsPerPage;
            const resultsToShow = searchResults.slice(start, end);

            if (resultsToShow.length === 0) {
                container.innerHTML = `
                    <div class="no-results">
                        <div class="no-results-icon">🔍</div>
                        <div class="no-results-text">未找到相关结果</div>
                        <div class="no-results-tips">尝试更换关键词或调整搜索选项</div>
                    </div>
                `;
                document.getElementById('loadMoreBtn').classList.add('hidden');
                return;
            }

            container.innerHTML = resultsToShow.map(item => `
                <div class="result-item" onclick="location.href='news-detail.html?id=${item.id}'">
                    <div class="result-title">
                        ${item.tag ? `<span class="result-tag">${item.tag}</span>` : ''}
                        ${highlightText(item.title, currentQuery)}
                    </div>
                    ${item.content ? `<div class="result-desc">${highlightText(item.content, currentQuery)}</div>` : ''}
                    <div class="result-meta">
                        <span class="result-category">${item.category}</span>
                        <span>${item.time}</span>
                        <span>👁 ${item.views}</span>
                    </div>
                </div>
            `).join('');

            // 更新加载更多按钮
            const loadMoreBtn = document.getElementById('loadMoreBtn');
            if (end < searchResults.length) {
                loadMoreBtn.classList.remove('hidden');
                loadMoreBtn.textContent = `加载更多 (${searchResults.length - end} 条)`;
            } else {
                loadMoreBtn.classList.add('hidden');
            }
        }

        // 加载更多结果
        function loadMoreResults() {
            currentPage++;
            const container = document.getElementById('resultsList');
            const start = currentPage * resultsPerPage;
            const end = start + resultsPerPage;
            const resultsToAdd = searchResults.slice(start, end);

            const newHtml = resultsToAdd.map(item => `
                <div class="result-item" onclick="location.href='news-detail.html?id=${item.id}'">
                    <div class="result-title">
                        ${item.tag ? `<span class="result-tag">${item.tag}</span>` : ''}
                        ${highlightText(item.title, currentQuery)}
                    </div>
                    ${item.content ? `<div class="result-desc">${highlightText(item.content, currentQuery)}</div>` : ''}
                    <div class="result-meta">
                        <span class="result-category">${item.category}</span>
                        <span>${item.time}</span>
                        <span>👁 ${item.views}</span>
                    </div>
                </div>
            `).join('');

            container.insertAdjacentHTML('beforeend', newHtml);

            // 更新按钮状态
            const loadMoreBtn = document.getElementById('loadMoreBtn');
            if (end >= searchResults.length) {
                loadMoreBtn.classList.add('hidden');
            } else {
                loadMoreBtn.textContent = `加载更多 (${searchResults.length - end} 条)`;
            }
        }
    </script>
