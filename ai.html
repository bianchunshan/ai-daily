"2025年9月1日", "views": "51万", "content": "在2025世界人工智能大会上，美的集团家用人形机器人'美拉'完成全球首次公开亮相。支持语音指令控制家电、环境感知及个性化服务，2026年将加速场景落地。", "sources": [{"name": "微信", "url": "http://mp.weixin.qq.com/s?__biz=MzUyMzM3NzMxOA=="}]}, {"id": "a8", "title": "OpenAI发布开源模型gpt-oss-120b和gpt-oss-20b", "category": "人工智能", "tag": "开源", "time": "2025年8月", "views": "47万", "content": "OpenAI时隔五年首次发布开源模型，采用Apache 2.0许可，允许企业免费商用。支持复杂推理、工具使用和云端查询。", "sources": [{"name": "微信", "url": "http://mp.weixin.qq.com/s?__biz=MzU2NzczOTI5Ng=="}]}, {"id": "a9", "title": "清华大学：2026年AI大规模落地制造业，看好汽车、机器人", "category": "人工智能", "tag": "产业", "time": "1月31日", "views": "41万", "content": "清华大学专家指出，2026年AI大规模落地制造业，较看好汽车、机器人等先进制造企业。大模型应用超过40%聚集在客服等运营管理环节，生产制造环节AI应用比例从19.9%提升到25.9%。", "sources": [{"name": "清华大学", "url": "https://www.tsinghua.edu.cn/info/1182/124190.htm"}]}, {"id": "a10", "title": "Zoom发布2026年AI技术趋势预测", "category": "人工智能", "tag": "企业", "time": "1月13日", "views": "29万", "content": "Zoom高管预测2026年AI五大趋势：联邦式AI与代理式AI兴起、市场营销领域的真实性、客户体验的演变、AI信任与监管、人机协作伙伴关系。", "sources": [{"name": "Zoom博客", "url": "https://www.zoom.com/zh-cn/blog/ai-technology-trends-2026/"}]}];
        
        function renderNews() {
            const newsList = document.getElementById('news-list');
            const newsToShow = allNews.slice(0, currentNewsIndex + newsPerPage);
            
            newsList.innerHTML = newsToShow.map(news => `
                <div class="news-item" onclick="location.href='news-detail.html?id=${news.id}'">
                    <div class="news-title">
                        ${news.tag ? `<span class="tag">${news.tag}</span>` : ''}
                        ${news.title}
                    </div>
                    <div class="news-meta">${news.time} · ${news.category}</div>
                </div>
            `).join('');
        }
        
        function loadMoreNews() {
            currentNewsIndex += newsPerPage;
            renderNews();
        }
        
        renderNews();
    </script>
