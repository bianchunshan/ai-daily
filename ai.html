    <script>
        let currentNewsIndex = 0;
        const newsPerPage = 10;
        let allNews = [
    {"id": "a0", "title": "【最新】中国人形机器人频频破圈，具身智能迈入应用时代", "category": "人工智能", "tag": "重磅", "time": "2月28日", "views": "198万", "content": "2026年伊始，从美国拉斯维加斯消费电子展（CES）到中国春晚，中国自主研发的人形机器人频频破圈，多家企业的产品和应用引发热议。具身智能全球市场规模2025年约为44.4亿美元，预计2030年将达230亿美元。中国具身智能产业市场规模有望在2035年突破万亿元。", "sources": [{"name": "光明日报", "url": "https://news.gmw.cn/2026-02/28/content_38616652.htm"}]},
    {"id": "a1", "title": "【重磅】特朗普政府禁止Anthropic向政府提供AI服务，OpenAI接手五角大楼合同", "category": "人工智能", "tag": "政策", "time": "3月3日", "views": "156万", "content": "特朗普政府禁止Anthropic向联邦政府提供AI服务，因其拒绝放弃安全护栏。OpenAI随即接手五角大楼合同，预测市场显示OpenAI在3月编程专业化领域领先(86%)，Anthropic从84%跌至71%。", "sources": [{"name": "MML Studio", "url": "https://mml-studio.com"}]},
    {"id": "a2", "title": "OpenAI融资1100亿美元，xAI获新投资，月度AI资本达1400亿美元", "category": "人工智能", "tag": "资本", "time": "3月2日", "views": "128万", "content": "OpenAI完成1100亿美元融资轮，xAI也获得新投资。仅一个月内AI领域新增资本达1400亿美元。Meta入股AMD芯片(10%股权)，美光投资1000亿美元建设超级晶圆厂。", "sources": [{"name": "MML Studio", "url": "https://mml-studio.com"}]},
    {"id": "a3", "title": "MCP协议成AI基础设施新标准，OpenAI、微软、谷歌全面采纳", "category": "人工智能", "tag": "技术", "time": "3月2日", "views": "98万", "content": "Anthropic的模型上下文协议(MCP)被称为'AI的USB-C'，让AI智能体无需定制集成即可连接外部工具。OpenAI、微软公开采纳，谷歌正在部署自有MCP服务器。Anthropic已将其捐赠给Linux基金会。", "sources": [{"name": "The AI Journal", "url": "https://theaijournal.co"}]},
    {"id": "a4", "title": "AI数据中心能源危机：成为2026年数字建设最大制约因素", "category": "人工智能", "tag": "能源", "time": "3月1日", "views": "87万", "content": "EY Americas指出能源是'2026年整个数字建设最关键的制约因素'。训练一个前沿AI模型消耗的电力相当于一个小镇一年的用电量。微软、谷歌、亚马逊正投资核能(小型模块化反应堆和传统核电站)以满足AI能源需求。", "sources": [{"name": "The AI Journal", "url": "https://theaijournal.co"}]},
    {"id": "a5", "title": "OpenAI目标2026年营收300亿美元，Anthropic目标150亿美元", "category": "人工智能", "tag": "商业", "time": "3月1日", "views": "76万", "content": "OpenAI 2025年年化经常性收入约200亿美元，2026年目标300亿美元。Anthropic目标从47亿美元增至150亿美元。摩根大通将AI投资从'实验性研发'重新归类为'核心基础设施'。", "sources": [{"name": "The AI Journal", "url": "https://theaijournal.co"}]},
    {"id": "a6", "title": "DeepSeek V4发布，测试中国芯片能否突破美国禁运", "category": "人工智能", "tag": "国产", "time": "3月1日", "views": "112万", "content": "DeepSeek V4在中国芯片上运行，将测试美国禁运是否仍有意义。MIT Technology Review指出，中国开源模型正被用于美国应用，政府立场与地面现实的差距是2026年的决定性张力之一。", "sources": [{"name": "MML Studio", "url": "https://mml-studio.com"}]},
    {"id": "a7", "title": "GitHub 2025年代码提交量达10亿次，AI辅助编程成主因", "category": "人工智能", "tag": "开发者", "time": "2月28日", "views": "65万", "content": "GitHub 2025年数据：每月合并4300万次pull request(同比增23%)，总提交量达10亿次(增25%)。GitHub Copilot、Cursor等AI辅助编程工具是主要驱动力。2026年将推出'代码库智能'功能。", "sources": [{"name": "The AI Journal", "url": "https://theaijournal.co"}]},
    {"id": "a8", "title": "印度AI峰会创纪录：25万+参会，谷歌微软亚马逊承诺680亿美元投资", "category": "人工智能", "tag": "全球", "time": "2月16日", "views": "54万", "content": "印度AI影响峰会是2026年最大AI治理活动，首次在发展中国家举办，参会人数超25万。谷歌、微软、亚马逊承诺到2030年向印度投资680亿美元。印度ChatGPT日活用户7200万，为全球最大市场。", "sources": [{"name": "The AI Journal", "url": "https://theaijournal.co"}]},
    {"id": "a9", "title": "印度呼叫中心面临50%收入冲击，AI替代加速", "category": "人工智能", "tag": "就业", "time": "2月20日", "views": "89万", "content": "Jefferies预测，到2030年印度呼叫中心将面临50%收入冲击。AI客服工具正在处理过去由人工处理的交互。客服、内容审核、基础代码审查、数据录入、发票处理、法律文件审查等领域正经历实质性裁员。", "sources": [{"name": "The AI Journal", "url": "https://theaijournal.co"}]},
    {"id": "a10", "title": "世界模型成AI下一前沿，游戏市场2030年将达2760亿美元", "category": "人工智能", "tag": "预测", "time": "2月25日", "views": "43万", "content": "世界模型实时生成交互式动态虚拟环境。Yann LeCun离开Meta创办世界模型实验室(估值50亿美元)，Google DeepMind发布Genie 3，李飞飞World Labs发布Marble。PitchBook预测世界模型游戏市场将从12亿美元增至2760亿美元(2030年)。", "sources": [{"name": "The AI Journal", "url": "https://theaijournal.co"}]},
    {"id": "a11", "title": "NASA毅力号完成首次全AI自主火星驾驶", "category": "人工智能", "tag": "航天", "time": "2月26日", "views": "67万", "content": "NASA毅力号火星车于2026年2月完成首次全AI自主驾驶。AI分析通常由人工操作员使用的地形数据和图像，规划路线并执行，无需人工介入。这标志着AI在高风险、零容错环境中自主运行。", "sources": [{"name": "The AI Journal", "url": "https://theaijournal.co"}]},
    {"id": "a12", "title": "斯坦福AI通过一晚睡眠数据预测疾病风险", "category": "人工智能", "tag": "医疗", "time": "1月", "views": "52万", "content": "斯坦福研究人员构建的AI可通过一晚睡眠监测数据预测未来疾病风险。系统分析脑活动、心率、呼吸等生理信号，在症状出现前识别疾病风险升高的模式。2026年1月发表。", "sources": [{"name": "ScienceDaily", "url": "https://www.sciencedaily.com"}]}
];
        
        function renderNews() {
            const newsList = document.getElementById('news-list');
            const newsToShow = allNews.slice(0, currentNewsIndex + newsPerPage);
            
            newsList.innerHTML = newsToShow.map(news => `
                <div class="news-item" onclick="location.href='news-detail.html?id=${news.id}'">
                    <div class="news-title">
                        ${news.tag ? `<span class="tag">${news.tag}</span>` : ''}
                        ${news.title}
                    </div>
                    <div class="news-meta">${news.time} · ${news.category}</div>
                </div>
            `).join('');
        }
        
        function loadMoreNews() {
            currentNewsIndex += newsPerPage;
            renderNews();
        }
        
        renderNews();
    </script>

    <!-- 统一数据源 -->
    <script src="data/news-data.js"></script>
