    <script>
        let currentNewsIndex = 0;
        const newsPerPage = 10;
        let allNews = [{"id": "s1", "title": "2026年半导体行业展望：增长但极不均匀，AI驱动与内存短缺并存", "category": "半导体", "tag": "重磅", "time": "3月3日", "views": "78万", "content": "2025年全球半导体市场规模接近7920亿美元，增长25.6%。2026年预计增长26%突破1万亿美元。AI需求持续扩张，但内存短缺引发结构性挤出效应，PC和智能手机市场面临逆风。", "sources": [{"name": "新浪财经", "url": "https://finance.sina.com.cn/cj/2026-03-03/doc-inhpsicr4046519.shtml"}]}, {"id": "s2", "title": "超150家半导体公司业绩揭晓，涨价潮为2026再添变量", "category": "半导体", "tag": "财报", "time": "3月1日", "views": "65万", "content": "截至2月28日，申万半导体行业173家上市公司中152家披露2025年业绩。涨价效应已从存储芯片传导至功率、模拟、MCU等非存储领域，涨幅10%至80%不等。", "sources": [{"name": "中国能源网", "url": "https://www.cnenergynews.cn/article/4QZBKxb12vw"}]}, {"id": "s3", "title": "全球半导体最新展望：2026年销售额将达9750亿美元", "category": "半导体", "tag": "预测", "time": "2月18日", "views": "52万", "content": "德勤预测2026年生成式AI芯片收入接近5000亿美元，约占全球芯片销售额一半。尽管AI芯片贡献约一半收入，但其销量占比不到0.2%。", "sources": [{"name": "腾讯新闻", "url": "https://news.qq.com/rain/a/20260218A01X9I00"}]}, {"id": "s4", "title": "Omdia：2026年全球半导体营收将突破1万亿美元大关", "category": "半导体", "tag": "里程碑", "time": "1月", "views": "48万", "content": "Omdia最新分析显示，2026年半导体营收增长源于高度集中的AI相关需求。若剔除内存和逻辑IC，半导体整体营收增长率将从30.7%降至仅8%。", "sources": [{"name": "万业企业", "url": "https://www.600641.com.cn/index.php?m=content&c=index&a=show&catid=63&id=450"}]}, {"id": "s5", "title": "美光18亿美元收购力积电铜锣晶圆厂", "category": "半导体", "tag": "并购", "time": "1月17日", "views": "41万", "content": "美光科技将以总价18亿美元现金收购力积电位于中国台湾省苗栗县铜锣的P5晶圆厂。交易预计2026年第二季度完成，美光将从2027年下半年开始显著提高DRAM晶圆产量。", "sources": [{"name": "万业企业", "url": "https://www.600641.com.cn/index.php?m=content&c=index&a=show&catid=63&id=450"}]}, {"id": "s6", "title": "2026年半导体产业十大看点：RISC-V加速进军数据中心", "category": "半导体", "tag": "趋势", "time": "1月16日", "views": "37万", "content": "中国半导体行业协会发布2026年产业看点：ASIC渗透率将达40%，端侧SoC持续受益于AI终端创新，卫星通信开辟半导体增量空间，存储芯片产能吃紧态势延续。", "sources": [{"name": "CSIA", "url": "https://web.csia.net.cn/newsinfo/10945896.html"}]}, {"id": "s7", "title": "TrendForce：8英寸晶圆代工价格涨幅最高达20%", "category": "半导体", "tag": "涨价", "time": "1月14日", "views": "33万", "content": "随着台积电、三星降低8英寸晶圆代工产能，2026年全球8英寸晶圆代工总产能将减少2.4%。AI驱动的电源管理芯片需求强劲，部分晶圆厂已通知客户将调涨代工价5%至20%。", "sources": [{"name": "万业企业", "url": "https://www.600641.com.cn/index.php?m=content&c=index&a=show&catid=63&id=450"}]}, {"id": "s8", "title": "SEMI：未来两年半导体制造设备销售额将继续增长", "category": "半导体", "tag": "设备", "time": "1月", "views": "29万", "content": "预计2025年全球半导体设备销售额达1330亿美元，同比增长13.7%。2026年和2027年分别达到1450亿美元和1560亿美元，主要得益于AI相关投资推动。", "sources": [{"name": "万业企业", "url": "https://www.600641.com.cn/index.php?m=content&c=index&a=show&catid=63&id=450"}]}, {"id": "s9", "title": "粤芯半导体四期项目启动，总投资252亿元", "category": "半导体", "tag": "投资", "time": "1月22日", "views": "35万", "content": "粤芯半导体四期项目总投资约252亿元，将建设月产4万片的12英寸数模混合特色工艺生产线，工艺技术节点覆盖65nm至22nm，预计2029年底建成。", "sources": [{"name": "万业企业", "url": "https://www.600641.com.cn/index.php?m=content&c=index&a=show&catid=63&id=450"}]}, {"id": "s10", "title": "华虹无锡12寸晶圆厂扩产，月产能将达5.5万片", "category": "半导体", "tag": "扩产", "time": "1月6日", "views": "28万", "content": "华虹Fab 9B项目开启招标，将建设一条月产能达到5.5万片的12英寸特色工艺生产线。项目合同估算价38亿元，计划2027年1月竣工。", "sources": [{"name": "万业企业", "url": "https://www.600641.com.cn/index.php?m=content&c=index&a=show&catid=63&id=450"}]}];
        
        function renderNews() {
            const newsList = document.getElementById('news-list');
            const newsToShow = allNews.slice(0, currentNewsIndex + newsPerPage);
            
            newsList.innerHTML = newsToShow.map(news => `
                <div class="news-item" onclick="location.href='news-detail.html?id=${news.id}'">
                    <div class="news-title">
                        ${news.tag ? `<span class="tag">${news.tag}</span>` : ''}
                        ${news.title}
                    </div>
                    <div class="news-meta">${news.time} · ${news.category}</div>
                </div>
            `).join('');
        }
        
        function loadMoreNews() {
            currentNewsIndex += newsPerPage;
            renderNews();
        }
        
        renderNews();
    </script>
