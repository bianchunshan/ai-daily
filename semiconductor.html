    <script>

        let allNews = [
    {"id": "s0", "title": "【最新】A股半导体涨价潮来袭，最高涨幅达80%，AI成核心推手", "category": "半导体", "tag": "涨价", "time": "3月3日", "views": "245万", "content": "进入2026年，半导体行业迎来新一轮涨价潮。本轮涨价从存储开始，逐渐扩散至功率器件、晶圆代工、封测等多个环节。A股多家产业链公司发出涨价函，涨价幅度普遍在10%~20%，幅度大的甚至达50%~80%。上游原材料及关键贵金属价格大幅攀升是主要原因；下游AI带来的需求激增则进一步推高半导体产品价格。", "sources": [{"name": "21世纪经济报道", "url": "https://www.21jingji.com/article/20260303/herald/4a03378d67e35c4e1a391b02f4bd6e40.html"}]},
    {"id": "s1", "title": "【重磅】2026年全球半导体销售额将达9750亿美元，AI芯片占半壁江山", "category": "半导体", "tag": "预测", "time": "3月3日", "views": "156万", "content": "德勤预测2026年全球半导体销售额将达9750亿美元，创历史新高。生成式AI芯片收入接近5000亿美元，约占全球芯片销售额一半。尽管AI芯片贡献约一半收入，但其销量占比不到0.2%(仅约2000万颗)。", "sources": [{"name": "Deloitte", "url": "https://www.deloitte.com"}]},
    {"id": "s2", "title": "WSTS：2026年全球半导体市场增长超25%，逼近1万亿美元", "category": "半导体", "tag": "数据", "time": "3月2日", "views": "128万", "content": "世界半导体贸易统计组织(WSTS)预测，2026年全球半导体市场将增长超25%，达到9750亿美元。内存和逻辑芯片将领涨，均增长超30%。美洲和亚太地区是主要增长引擎。", "sources": [{"name": "WSTS", "url": "https://www.wsts.org"}]},
    {"id": "s3", "title": "内存短缺危机持续，DDR4/DDR5价格预计进一步上涨", "category": "半导体", "tag": "涨价", "time": "3月2日", "views": "98万", "content": "AI数据中心吞噬全球内存和存储供应，可能引发持续十年的定价危机。德勤预测2026年内存收入达2000亿美元，供应商对低利润产品扩产谨慎。HBM需求推高DDR4和DDR5价格，Q4内存价格已上涨50%。", "sources": [{"name": "Deloitte", "url": "https://www.deloitte.com"}]},
    {"id": "s4", "title": "NVIDIA发布Rubin平台，六款新芯片定义下一代AI超算", "category": "半导体", "tag": "新品", "time": "1月", "views": "87万", "content": "NVIDIA在CES 2026发布Rubin平台，推出六款新芯片和紧密集成的AI超级计算机架构。这是继Blackwell后的下一代平台，专注于通过协同设计硬件、系统和软件来扩展AI性能。", "sources": [{"name": "NVIDIA", "url": "https://www.nvidia.com"}]},
    {"id": "s5", "title": "日本Rapidus瞄准2nm芯片量产，挑战台积电三星", "category": "半导体", "tag": "制程", "time": "1月", "views": "76万", "content": "日本初创公司Rapidus继续吸引投资兴趣，目标实现2nm大规模量产。如成功，将标志着先进制程竞争的重大转变，为传统领先晶圆厂之外提供新选择。", "sources": [{"name": "ASIC Pro", "url": "https://www.asicpro.com"}]},
    {"id": "s6", "title": "全球300mm晶圆厂产能2026年将达960万片/月", "category": "半导体", "tag": "产能", "time": "2月16日", "views": "65万", "content": "SEMI预测全球300mm晶圆厂产能将在2026年达到960万片/月，同比增长7%。但扩产速度仍跟不上需求，特别是用于AI训练和推理芯片的先进制程。台积电、三星、英特尔继续争夺有限产能。", "sources": [{"name": "SEMI", "url": "https://www.semi.org"}]},
    {"id": "s7", "title": "Intel Foundry repositioning to capture AI chip market share", "category": "半导体", "tag": "竞争", "time": "2月16日", "views": "54万", "content": "在新领导层带领下，Intel Foundry正重新定位以获取AI芯片市场更大份额。战略聚焦先进制程开发和与无晶圆厂芯片设计商扩大合作，寻求台积电主导地位的替代方案。", "sources": [{"name": "KO2U", "url": "https://ko2u.com"}]},
    {"id": "s8", "title": "三星持续投资EUV光刻产能，成为台积电替代选择", "category": "半导体", "tag": "投资", "time": "2月16日", "views": "43万", "content": "三星晶圆代工事业部继续投资先进EUV光刻产能，定位为寻求供应链多元化客户的可行替代方案。韩国半导体公司在内存和逻辑制造中保持关键地位。", "sources": [{"name": "KO2U", "url": "https://ko2u.com"}]},
    {"id": "s9", "title": "美光1000亿美元投资超级晶圆厂，Meta入股AMD", "category": "半导体", "tag": "资本", "time": "3月2日", "views": "112万", "content": "美光宣布投资1000亿美元建设超级晶圆厂。Meta入股AMD芯片(10%股权选项)。这反映了AI需求驱动的半导体行业大规模资本支出浪潮。", "sources": [{"name": "MML Studio", "url": "https://mml-studio.com"}]},
    {"id": "s10", "title": "中国半导体行业协会发布2026年产业十大看点", "category": "半导体", "tag": "趋势", "time": "1月16日", "views": "89万", "content": "CSIA发布2026年产业看点：ASIC渗透率将达40%，端侧SoC持续受益于AI终端创新，卫星通信开辟半导体增量空间，存储芯片产能吃紧态势延续，RISC-V加速进军数据中心。", "sources": [{"name": "CSIA", "url": "https://web.csia.net.cn"}]}
];
        
        function renderNews() {
            const newsList = document.getElementById('news-list');
            const newsToShow = allNews.slice(0, currentNewsIndex + newsPerPage);
            
            newsList.innerHTML = newsToShow.map(news => `
                <div class="news-item" onclick="location.href='news-detail.html?id=${news.id}'">
                    <div class="news-title">
                        ${news.tag ? `<span class="tag">${news.tag}</span>` : ''}
                        ${news.title}
                    </div>
                    <div class="news-meta">${news.time} · ${news.category}</div>
                </div>
            `).join('');
        }
        
        function loadMoreNews() {
            currentNewsIndex += newsPerPage;
            renderNews();
        }
        
        renderNews();
    </script>
